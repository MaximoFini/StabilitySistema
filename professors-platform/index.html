  <!-- Estilos del spinner nativo (visible ANTES de que React cargue el JS) -->
  <style>
    body {
      margin: 0;
      background-color: #09090b;
    }

    .pantalla-carga {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-left-color: #ffffff;
      border-radius: 50%;
      animation: girar 0.8s linear infinite;
    }

    @keyframes girar {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Spinner visible solo durante la carga inicial del JS bundle.
           React lo reemplaza automáticamente al montar la app. -->
    <div class="pantalla-carga" id="pantalla-carga-inicial">
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>

  <!--
      FAILSAFE: Script de recuperación independiente de React.
      Si React no monta en 10 segundos, asumimos que el SW sirvió
      JS corrupto/desactualizado. Limpiamos todo y recargamos.
    -->
  <script>
    (function () {
      var FAILSAFE_KEY = "__stability_failsafe_v1";
      var TIMEOUT_MS = 10000;

      var timer = setTimeout(function () {
        // Si el spinner sigue visible, React no montó
        var spinner = document.getElementById("pantalla-carga-inicial");
        if (!spinner) return; // React montó correctamente, nada que hacer

        // Anti-loop: si ya intentamos recuperar una vez, no intentar de nuevo
        var attempts = parseInt(sessionStorage.getItem(FAILSAFE_KEY) || "0");
        if (attempts >= 2) {
          // Mostrar mensaje de error en vez de loop infinito
          spinner.innerHTML =
            '<div style="text-align:center;color:#fff;padding:2rem;">' +
            "<p>Error al cargar la aplicación.</p>" +
            '<button onclick="sessionStorage.clear();localStorage.clear();location.reload()" ' +
            'style="margin-top:1rem;padding:0.5rem 1rem;background:#3b82f6;color:#fff;border:none;border-radius:0.5rem;cursor:pointer;">' +
            "Reiniciar app</button></div>";
          return;
        }

        sessionStorage.setItem(FAILSAFE_KEY, String(attempts + 1));

        // Nuclear: desregistrar SW + limpiar caches + recargar
        var p1 = navigator.serviceWorker
          ? navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(
              regs.map(function (r) {
                return r.unregister();
              }),
            );
          })
          : Promise.resolve();

        var p2 = window.caches
          ? caches.keys().then(function (names) {
            return Promise.all(
              names.map(function (n) {
                return caches.delete(n);
              }),
            );
          })
          : Promise.resolve();

        Promise.all([p1, p2]).then(function () {
          location.reload();
        });
      }, TIMEOUT_MS);

      // Si React monta, cancela el failsafe
      // React reemplaza el contenido de #root, eliminando #pantalla-carga-inicial
      var observer = new MutationObserver(function () {
        if (!document.getElementById("pantalla-carga-inicial")) {
          clearTimeout(timer);
          sessionStorage.removeItem(FAILSAFE_KEY);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });
    })();
  </script>
</body>
