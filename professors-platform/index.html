  <!-- Estilos del splash screen nativo (visible ANTES de que React cargue el JS) -->
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      background-color: #0b1d3a;
    }

    .splash {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      background: linear-gradient(135deg, #0b1d3a 0%, #0d2654 50%, #0b1d3a 100%);
      gap: 0;
    }

    /* Logo container */
    .splash-logo-wrap {
      background: rgba(255, 255, 255, 0.97);
      border-radius: 20px;
      padding: 20px 24px;
      width: 140px;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.35);
      animation: splashFadeIn 0.5s ease-out both;
    }

    .splash-logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Wordmark */
    .splash-wordmark {
      margin-top: 24px;
      font-family: 'Palatino Linotype', 'Palatino', 'Book Antiqua', Georgia, serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      color: #ffffff;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
      animation: splashFadeIn 0.5s 0.15s ease-out both;
    }

    /* Divider */
    .splash-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      animation: splashFadeIn 0.5s 0.25s ease-out both;
    }

    .splash-divider-line {
      width: 48px;
      height: 1px;
      background: rgba(255, 255, 255, 0.35);
    }

    .splash-divider-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
    }

    /* Subtitle */
    .splash-sub {
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      margin-top: 8px;
      animation: splashFadeIn 0.5s 0.3s ease-out both;
    }

    /* Progress bar */
    .splash-bar-track {
      width: 120px;
      height: 2px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 99px;
      margin-top: 40px;
      overflow: hidden;
      animation: splashFadeIn 0.5s 0.4s ease-out both;
    }

    .splash-bar-fill {
      height: 100%;
      width: 40%;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 99px;
      animation: barSlide 1.4s ease-in-out infinite;
    }

    @keyframes barSlide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(340%);
      }
    }

    @keyframes splashFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Splash screen visible solo durante la carga inicial del JS bundle.
           React lo reemplaza automáticamente al montar la app. -->
    <div class="splash" id="pantalla-carga-inicial">
      <div class="splash-logo-wrap">
        <img src="/logo-stability.png" alt="Stability" />
      </div>
      <div class="splash-wordmark">STABILITY</div>
      <div class="splash-divider">
        <div class="splash-divider-line"></div>
        <div class="splash-divider-dot"></div>
        <div class="splash-divider-line"></div>
      </div>
      <div class="splash-sub">Entrenamiento y Salud</div>
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>

  <!--
      FAILSAFE: Script de recuperación independiente de React.
      Si React no monta en 10 segundos, asumimos que el SW sirvió
      JS corrupto/desactualizado. Limpiamos todo y recargamos.
    -->
  <script>
    (function () {
      var FAILSAFE_KEY = "__stability_failsafe_v1";
      var TIMEOUT_MS = 10000;

      var timer = setTimeout(function () {
        // Si el spinner sigue visible, React no montó
        var spinner = document.getElementById("pantalla-carga-inicial");
        if (!spinner) return; // React montó correctamente, nada que hacer

        // Anti-loop: si ya intentamos recuperar una vez, no intentar de nuevo
        var attempts = parseInt(sessionStorage.getItem(FAILSAFE_KEY) || "0");
        if (attempts >= 2) {
          // Mostrar mensaje de error en vez de loop infinito
          spinner.innerHTML =
            '<div style="text-align:center;color:#fff;padding:2rem;">' +
            "<p>Error al cargar la aplicación.</p>" +
            '<button onclick="sessionStorage.clear();localStorage.clear();location.reload()" ' +
            'style="margin-top:1rem;padding:0.5rem 1rem;background:#3b82f6;color:#fff;border:none;border-radius:0.5rem;cursor:pointer;">' +
            "Reiniciar app</button></div>";
          return;
        }

        sessionStorage.setItem(FAILSAFE_KEY, String(attempts + 1));

        // Nuclear: desregistrar SW + limpiar caches + recargar
        var p1 = navigator.serviceWorker
          ? navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(
              regs.map(function (r) {
                return r.unregister();
              }),
            );
          })
          : Promise.resolve();

        var p2 = window.caches
          ? caches.keys().then(function (names) {
            return Promise.all(
              names.map(function (n) {
                return caches.delete(n);
              }),
            );
          })
          : Promise.resolve();

        Promise.all([p1, p2]).then(function () {
          location.reload();
        });
      }, TIMEOUT_MS);

      // Si React monta, cancela el failsafe
      // React reemplaza el contenido de #root, eliminando #pantalla-carga-inicial
      var observer = new MutationObserver(function () {
        if (!document.getElementById("pantalla-carga-inicial")) {
          clearTimeout(timer);
          sessionStorage.removeItem(FAILSAFE_KEY);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), {
        childList: true,
        subtree: true,
      });
    })();
  </script>
</body>

</html>
